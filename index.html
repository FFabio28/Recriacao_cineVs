<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEVS - Clone</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">CINE<span>VS</span></div>
        <nav>
            <a href="#" class="active">Início</a>
            <a href="#">Catálogo</a>
            <a href="#">Minha Lista</a>
            <a href="#">Canais</a>
        </nav>
        <div class="nav-icons">
            <span class="search-icon">🔍</span>
            <span class="notification">🔔<small>9+</small></span>
            <div class="user-avatar"></div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-overlay"></div> 
        
        <div class="hero-content">
            <img src="img/logo-mario.png" alt="Super Mario Galaxy" class="movie-logo">
            <div class="movie-meta">
                <span class="imdb">⭐ 4.4</span>
                <span class="info">2026 • Aventura • Comédia • Animação</span>
            </div>
            <p class="description">
                Depois de salvar o Reino dos Cogumelos, Mario e seus amigos se encontram em uma missão intergaláctica para deter um novo vilão ameaçador.
            </p>
            <button class="btn-assistir">▶ Assistir</button>
        </div>
        
        <div class="carousel-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </section>

    <section class="channels-section">
        <div class="section-header">
            <h2>🔴 Canais Grátis</h2>
            <a href="#" class="view-all">Ver todos →</a>
        </div>
        <div class="channels-grid">
            <div class="channel-card sbt">
                <span class="live-tag">LIVE</span>
                <img src="img/SBT.png" alt="SBT">
            </div>
            <div class="channel-card globo">
                <span class="live-tag">LIVE</span>
                <img src="img/globo.png" alt="Globo">
            </div>
            <div class="channel-card record">
                <span class="live-tag">LIVE</span>
                <img src="img/record.png" alt="Record">
            </div>
            <div class="channel-card band">
                <span class="live-tag">LIVE</span>
                <img src="img/band.png" alt="Band">
            </div>
            <div class="channel-card redetv">
                <span class="live-tag">LIVE</span>
                <img src="img/redetv.png" alt="RedeTV">
            </div>
            <div class="channel-card globoplay">
                <span class="live-tag">LIVE</span>
                <img src="img/globoplay.png" alt="Globoplay">
            </div>
            <div class="channel-card multishow">
                <span class="live-tag">LIVE</span>
                <img src="img/multishow.png" alt="Multishow">
            </div>
        </div>
    </section>

</body>
</html>
